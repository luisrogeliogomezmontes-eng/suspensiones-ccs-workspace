<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1060" width="1600" height="1060">
  <defs>
    <marker id="arw" markerWidth="12" markerHeight="12" refX="8.5" refY="3.2" orient="auto"><path d="M0,0 L9,3.2 L0,6.4 Z" fill="#94A3B8"/></marker>
    <marker id="arwv" markerWidth="12" markerHeight="12" refX="8.5" refY="3.2" orient="auto"><path d="M0,0 L9,3.2 L0,6.4 Z" fill="#7C3AED"/></marker>
    <marker id="arwr" markerWidth="12" markerHeight="12" refX="8.5" refY="3.2" orient="auto"><path d="M0,0 L9,3.2 L0,6.4 Z" fill="#DC2626"/></marker>
    <marker id="arwa" markerWidth="12" markerHeight="12" refX="8.5" refY="3.2" orient="auto"><path d="M0,0 L9,3.2 L0,6.4 Z" fill="#D97706"/></marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1060" fill="#FFFFFF"/>

  <g font-family="Inter, 'Segoe UI', Arial, sans-serif">

    <!-- ============ HEADER ============ -->
    <text x="48" y="52" font-size="27" font-weight="700" fill="#0F172A">Sistema de Telemetría ESP32 — Suspensiones Caracas</text>
    <text x="48" y="80" font-size="15" fill="#475569">Arquitectura del sistema · Depto. Eléctrica / Electrónica · Proyecto 1</text>

    <g>
      <rect x="1122" y="34" width="150" height="27" rx="13.5" fill="#DCFCE7" stroke="#16A34A"/>
      <text x="1197" y="52" font-size="11.5" font-weight="600" fill="#15803D" text-anchor="middle">Fase 2 ✅ desplegado</text>
      <rect x="1282" y="34" width="158" height="27" rx="13.5" fill="#FEF9C3" stroke="#CA8A04"/>
      <text x="1361" y="52" font-size="11.5" font-weight="600" fill="#A16207" text-anchor="middle">Fase 3 ⏳ control + auth</text>
      <rect x="1450" y="34" width="102" height="27" rx="13.5" fill="#E0E7FF" stroke="#4F46E5"/>
      <text x="1501" y="52" font-size="11.5" font-weight="700" fill="#3730A3" text-anchor="middle">BOM $184.80</text>
    </g>
    <line x1="48" y1="100" x2="1552" y2="100" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- ============ BAND 1 · FLUJO DE TELEMETRÍA ============ -->
    <rect x="32" y="120" width="1520" height="382" rx="14" fill="#FBFCFE" stroke="#E2E8F0"/>
    <rect x="48" y="132" width="410" height="26" rx="13" fill="#EEF2FF"/>
    <text x="62" y="150" font-size="13" font-weight="700" fill="#4338CA">①  Flujo de telemetría — de la maleta de moto a la app</text>

    <!-- downlink dashed (control) -->
    <path d="M900,214 L900,178 L470,178 L470,208" fill="none" stroke="#7C3AED" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arwv)"/>
    <text x="685" y="173" font-size="11" font-weight="600" fill="#7C3AED" text-anchor="middle">⇠ Downlink: el ESP32 hace polling de la tabla commands (fan / setpoint)</text>

    <!-- SENSORES -->
    <text x="150" y="212" font-size="11.5" font-weight="700" fill="#64748B" letter-spacing="1.5" text-anchor="middle">SENSORES</text>
    <g>
      <rect x="60" y="224" width="180" height="52" rx="10" fill="#F1F5F9" stroke="#64748B"/>
      <text x="150" y="246" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">DHT22 ×2</text>
      <text x="150" y="264" font-size="10.5" fill="#64748B" text-anchor="middle">Temp + humedad (GPIO4)</text>
      <rect x="60" y="288" width="180" height="52" rx="10" fill="#F1F5F9" stroke="#64748B"/>
      <text x="150" y="310" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">GPS u-blox NEO</text>
      <text x="150" y="328" font-size="10.5" fill="#64748B" text-anchor="middle">UART2 (16 / 17)</text>
      <rect x="60" y="352" width="180" height="52" rx="10" fill="#F1F5F9" stroke="#64748B"/>
      <text x="150" y="374" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">Sense VBAT</text>
      <text x="150" y="392" font-size="10.5" fill="#64748B" text-anchor="middle">Divisor → ADC1 (GPIO34)</text>
    </g>
    <line x1="240" y1="250" x2="298" y2="270" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <line x1="240" y1="314" x2="298" y2="300" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <line x1="240" y1="378" x2="298" y2="335" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <text x="270" y="430" font-size="10" fill="#94A3B8" text-anchor="middle">1-Wire · UART · ADC1</text>

    <!-- ESP32 -->
    <rect x="300" y="208" width="220" height="212" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
    <text x="410" y="234" font-size="15" font-weight="700" fill="#1D4ED8" text-anchor="middle">ESP32-WROOM-32</text>
    <g font-size="11" fill="#334155">
      <text x="316" y="260">• Firmware modular: gps · temp · net · charge</text>
      <text x="316" y="282">• Loop no bloqueante (millis)</text>
      <text x="316" y="304">• Tarea FreeRTOS → HTTPS / TLS</text>
      <text x="316" y="326">• Provisioning WiFi (portal cautivo)</text>
      <text x="316" y="348">• Watchdog · estado fail-safe</text>
    </g>
    <!-- actuador -->
    <line x1="410" y1="420" x2="410" y2="440" stroke="#059669" stroke-width="1.8" marker-end="url(#arw)"/>
    <rect x="300" y="442" width="220" height="48" rx="10" fill="#ECFDF5" stroke="#059669"/>
    <text x="410" y="461" font-size="11.5" font-weight="600" fill="#047857" text-anchor="middle">Fan 12 V PWM — velocidad 0–100 %</text>
    <text x="410" y="478" font-size="10.5" fill="#059669" text-anchor="middle">4 hilos · PWM GPIO26 · tach GPIO27</text>

    <!-- ENLACE -->
    <text x="685" y="212" font-size="11.5" font-weight="700" fill="#0369A1" letter-spacing="1.5" text-anchor="middle">ENLACE</text>
    <g>
      <rect x="600" y="224" width="170" height="52" rx="10" fill="#F0F9FF" stroke="#0EA5E9"/>
      <text x="685" y="255" font-size="12.5" font-weight="600" fill="#0369A1" text-anchor="middle">WiFi 2.4 GHz</text>
      <rect x="600" y="288" width="170" height="52" rx="10" fill="#F0F9FF" stroke="#0EA5E9"/>
      <text x="685" y="319" font-size="12.5" font-weight="600" fill="#0369A1" text-anchor="middle">Repetidor</text>
      <rect x="600" y="352" width="170" height="52" rx="10" fill="#F0F9FF" stroke="#0EA5E9"/>
      <text x="685" y="376" font-size="12.5" font-weight="600" fill="#0369A1" text-anchor="middle">Starlink</text>
      <text x="685" y="393" font-size="10.5" fill="#0284C7" text-anchor="middle">→ Internet</text>
    </g>
    <line x1="520" y1="270" x2="598" y2="250" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <text x="559" y="205" font-size="9.5" font-weight="600" fill="#64748B" text-anchor="middle">HTTPS · 5 s</text>
    <line x1="685" y1="276" x2="685" y2="286" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <line x1="685" y1="340" x2="685" y2="350" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>

    <!-- NUBE -->
    <rect x="840" y="214" width="212" height="192" rx="12" fill="#F0FDFA" stroke="#0D9488" stroke-width="2"/>
    <text x="946" y="240" font-size="15" font-weight="700" fill="#0F766E" text-anchor="middle">Supabase</text>
    <g font-size="11" fill="#334155">
      <text x="856" y="264">• Postgres: readings · devices</text>
      <text x="856" y="284">•   commands · events</text>
      <text x="856" y="304">• RLS + Auth (roles)</text>
      <text x="856" y="324">• Realtime (WebSocket)</text>
      <text x="856" y="344">• Edge Functions</text>
    </g>
    <rect x="840" y="418" width="212" height="40" rx="8" fill="none" stroke="#0D9488" stroke-dasharray="5 4"/>
    <text x="946" y="443" font-size="11" fill="#0F766E" text-anchor="middle">n8n · bridge + alertas (Fase 2)</text>
    <line x1="770" y1="366" x2="838" y2="320" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <text x="805" y="345" font-size="9.5" font-weight="600" fill="#64748B" text-anchor="middle">Internet</text>

    <!-- APP -->
    <rect x="1130" y="210" width="410" height="200" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
    <text x="1150" y="238" font-size="14.5" font-weight="700" fill="#6D28D9">Dashboard — Next.js @ Vercel · PWA</text>
    <g font-size="11.5" fill="#334155">
      <text x="1150" y="266">• Overview: testigos + gráfica de temperatura</text>
      <text x="1150" y="290">• Histórico: rangos, stats mín/prom/máx, export CSV</text>
      <text x="1150" y="314">• Mapa: trail GPS (Leaflet / OpenStreetMap)</text>
      <text x="1150" y="338">• Realtime en vivo · tema claro / oscuro</text>
    </g>
    <rect x="1150" y="358" width="372" height="30" rx="8" fill="#EDE9FE" stroke="#7C3AED"/>
    <text x="1336" y="378" font-size="11.5" font-weight="600" fill="#5B21B6" text-anchor="middle">🔗 suspensiones-esp32-telemetria.vercel.app</text>
    <line x1="1052" y1="300" x2="1128" y2="300" stroke="#94A3B8" stroke-width="1.8" marker-end="url(#arw)"/>
    <text x="1090" y="292" font-size="9.5" font-weight="600" fill="#64748B" text-anchor="middle">Realtime</text>

    <!-- ============ BAND 2 · ENERGÍA ============ -->
    <rect x="32" y="520" width="752" height="424" rx="14" fill="#FFFBEB" stroke="#FCD34D"/>
    <rect x="48" y="532" width="330" height="26" rx="13" fill="#FEF3C7"/>
    <text x="62" y="550" font-size="13" font-weight="700" fill="#B45309">②  Subsistema de energía — jack 12 V (D23)</text>

    <rect x="56" y="602" width="148" height="86" rx="10" fill="#FEF3C7" stroke="#D97706"/>
    <text x="130" y="638" font-size="12.5" font-weight="700" fill="#92400E" text-anchor="middle">EcoFlow</text>
    <text x="130" y="658" font-size="10.5" fill="#B45309" text-anchor="middle">salida jack</text>
    <text x="130" y="674" font-size="10.5" fill="#B45309" text-anchor="middle">12 V DC</text>

    <line x1="204" y1="645" x2="242" y2="645" stroke="#D97706" stroke-width="1.8" marker-end="url(#arwa)"/>
    <rect x="244" y="616" width="130" height="58" rx="10" fill="#FFFBEB" stroke="#D97706"/>
    <text x="309" y="641" font-size="12" font-weight="600" fill="#92400E" text-anchor="middle">Bornera "Y"</text>
    <text x="309" y="659" font-size="10.5" fill="#B45309" text-anchor="middle">riel 12 V</text>

    <path d="M374,632 L410,600 L436,600" fill="none" stroke="#D97706" stroke-width="1.8" marker-end="url(#arwa)"/>
    <path d="M374,658 L410,690 L436,690" fill="none" stroke="#D97706" stroke-width="1.8" marker-end="url(#arwa)"/>
    <rect x="438" y="574" width="154" height="52" rx="10" fill="#ECFDF5" stroke="#059669"/>
    <text x="515" y="600" font-size="11.5" font-weight="600" fill="#047857" text-anchor="middle">Fan 12 V</text>
    <text x="515" y="617" font-size="10.5" fill="#059669" text-anchor="middle">directo al riel</text>
    <rect x="438" y="664" width="154" height="52" rx="10" fill="#FFFBEB" stroke="#D97706"/>
    <text x="515" y="690" font-size="11.5" font-weight="600" fill="#92400E" text-anchor="middle">Buck LM2596</text>
    <text x="515" y="707" font-size="10.5" fill="#B45309" text-anchor="middle">12 V → 5.0 V</text>
    <line x1="592" y1="690" x2="628" y2="690" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arw)"/>
    <rect x="630" y="664" width="130" height="52" rx="10" fill="#EFF6FF" stroke="#2563EB"/>
    <text x="695" y="690" font-size="12" font-weight="700" fill="#1D4ED8" text-anchor="middle">ESP32</text>
    <text x="695" y="707" font-size="10.5" fill="#2563EB" text-anchor="middle">VIN 5 V</text>

    <text x="56" y="770" font-size="11" fill="#92400E">⚠ Ajustar el LM2596 a 5.0 V antes de conectar el ESP32.</text>
    <text x="56" y="792" font-size="11" fill="#92400E">   El ESP32 nunca toca los 12 V. Carga total ~0.7 A ≪ 3 A del puerto.</text>
    <text x="56" y="814" font-size="11" fill="#92400E">   ZY12PDN + USB-C descartados (D23) → quedan de repuesto.</text>

    <!-- ============ BAND 3 · CARGA ============ -->
    <rect x="800" y="520" width="752" height="424" rx="14" fill="#FEF2F2" stroke="#FCA5A5"/>
    <rect x="816" y="532" width="410" height="26" rx="13" fill="#FEE2E2"/>
    <text x="830" y="550" font-size="13" font-weight="700" fill="#B91C1C">③  Control de carga moto → EcoFlow (D24)</text>

    <rect x="820" y="600" width="120" height="66" rx="10" fill="#FEE2E2" stroke="#DC2626"/>
    <text x="880" y="628" font-size="11.5" font-weight="600" fill="#991B1B" text-anchor="middle">Batería moto</text>
    <text x="880" y="646" font-size="10.5" fill="#B91C1C" text-anchor="middle">12 V</text>
    <line x1="940" y1="633" x2="972" y2="633" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arwr)"/>
    <rect x="974" y="609" width="104" height="48" rx="10" fill="#FEF2F2" stroke="#DC2626"/>
    <text x="1026" y="638" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">Fusible 10–15 A</text>
    <line x1="1078" y1="633" x2="1108" y2="633" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arwr)"/>
    <rect x="1110" y="600" width="128" height="66" rx="10" fill="#FEF2F2" stroke="#DC2626"/>
    <text x="1174" y="626" font-size="11.5" font-weight="600" fill="#991B1B" text-anchor="middle">Relé Bosch 40 A</text>
    <text x="1174" y="644" font-size="10.5" fill="#B91C1C" text-anchor="middle">contacto 30–87</text>
    <line x1="1238" y1="633" x2="1268" y2="633" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arwr)"/>
    <rect x="1270" y="600" width="132" height="66" rx="10" fill="#FEF2F2" stroke="#DC2626"/>
    <text x="1336" y="626" font-size="11.5" font-weight="600" fill="#991B1B" text-anchor="middle">XL4016</text>
    <text x="1336" y="644" font-size="10.5" fill="#B91C1C" text-anchor="middle">CV≈12 V / CC≈3 A</text>
    <line x1="1402" y1="633" x2="1432" y2="633" stroke="#DC2626" stroke-width="1.8" marker-end="url(#arwr)"/>
    <rect x="1434" y="600" width="104" height="66" rx="10" fill="#FEE2E2" stroke="#DC2626"/>
    <text x="1486" y="628" font-size="11" font-weight="600" fill="#991B1B" text-anchor="middle">EcoFlow</text>
    <text x="1486" y="646" font-size="10" fill="#B91C1C" text-anchor="middle">entrada coche</text>

    <!-- control cluster -->
    <rect x="1096" y="716" width="180" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB"/>
    <text x="1186" y="740" font-size="12" font-weight="700" fill="#1D4ED8" text-anchor="middle">ESP32 · controlador</text>
    <text x="1186" y="758" font-size="10" fill="#2563EB" text-anchor="middle">GPIO34 sense · GPIO25 relé</text>
    <path d="M1174,716 L1174,666" fill="none" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arw)"/>
    <text x="1230" y="700" font-size="9.5" font-weight="600" fill="#2563EB" text-anchor="middle">MOSFET IRLZ44N</text>
    <path d="M1055,657 L1055,746 L1094,746" fill="none" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arw)"/>
    <text x="1030" y="700" font-size="9.5" font-weight="600" fill="#2563EB" text-anchor="middle">VBAT ÷ (100k/22k)+Zener</text>

    <text x="820" y="830" font-size="11" fill="#991B1B">Histéresis ON &gt; 13.5 V / OFF &lt; 13.0 V + debounce 3 s · min-OFF 30–60 s.</text>
    <text x="820" y="852" font-size="11" fill="#991B1B">Relé antes del XL4016 → cero consumo en standby. Bypass manual ∥ contacto (anti-deadlock).</text>
    <text x="820" y="874" font-size="11" fill="#991B1B">⚠ Validar que el EcoFlow acepte fuente CC 3 A sin ciclar.</text>

    <!-- ============ FOOTER / LEYENDA ============ -->
    <line x1="48" y1="978" x2="1552" y2="978" stroke="#E2E8F0" stroke-width="1.5"/>
    <g font-size="11" fill="#475569">
      <circle cx="56" cy="1006" r="6" fill="#64748B"/><text x="68" y="1010">Sensores</text>
      <circle cx="156" cy="1006" r="6" fill="#2563EB"/><text x="168" y="1010">Cómputo (ESP32)</text>
      <circle cx="316" cy="1006" r="6" fill="#0EA5E9"/><text x="328" y="1010">Enlace</text>
      <circle cx="404" cy="1006" r="6" fill="#0D9488"/><text x="416" y="1010">Nube</text>
      <circle cx="486" cy="1006" r="6" fill="#7C3AED"/><text x="498" y="1010">App</text>
      <circle cx="560" cy="1006" r="6" fill="#D97706"/><text x="572" y="1010">Energía</text>
      <circle cx="648" cy="1006" r="6" fill="#DC2626"/><text x="660" y="1010">Carga</text>
      <circle cx="720" cy="1006" r="6" fill="#059669"/><text x="732" y="1010">Actuador</text>
    </g>
    <text x="1552" y="1004" font-size="11" fill="#64748B" text-anchor="end">Unidad móvil: maleta de moto (~40×60×70 cm) · EcoFlow + Starlink</text>
    <text x="1552" y="1022" font-size="11" fill="#64748B" text-anchor="end">Monitorear temperatura = proteger Starlink / EcoFlow del calor</text>
    <text x="48" y="1040" font-size="10" fill="#94A3B8">Suspensiones Caracas · Depto. Eléctrica/Electrónica · Rogelio Gómez + Giovanni Ruiz · 2026-07-16</text>
  </g>
</svg>
