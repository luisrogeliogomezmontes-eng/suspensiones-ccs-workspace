# arduino-cli — configuración del sketch (Suspensiones P1).
#
# Board por defecto → basta con:  arduino-cli compile firmware
default_fqbn: esp32:esp32:esp32
# default_port: /dev/cu.usbserial-XX   # descomentar/ajustar por máquina (arduino-cli board list)
#
# Requisitos (una sola vez por máquina):
#   1) Core de ESPRESSIF (NO el paquete arduino:esp32 de Nano):
#        arduino-cli config add board_manager.additional_urls \
#          https://espressif.github.io/arduino-esp32/package_esp32_index.json
#        arduino-cli core update-index
#        arduino-cli core install esp32:esp32          # ⚠️ ~500 MB de toolchain
#   2) Librerías:
#        arduino-cli lib install "TinyGPSPlus" "OneWire" "DallasTemperature" "ArduinoJson"
#
# Compilar:  arduino-cli compile firmware
# Flashear:  arduino-cli upload -p <puerto> firmware
# Monitor:   arduino-cli monitor -p <puerto> -c baudrate=115200
