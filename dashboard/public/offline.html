<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión · SC Telemetría</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid; place-items: center;
        background: #0e1116; color: #e6edf3;
        font-family: system-ui, -apple-system, sans-serif; text-align: center;
      }
      .box { padding: 24px; max-width: 320px; }
      .logo {
        width: 44px; height: 44px; margin: 0 auto 16px; border-radius: 10px;
        border: 1px solid #232b38; display: grid; place-items: center;
        color: #3b9eff; font-weight: 800; letter-spacing: .05em;
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { color: #9aa7b6; font-size: 14px; line-height: 1.5; margin: 0; }
      button {
        margin-top: 20px; padding: 10px 18px; border: 0; border-radius: 8px;
        background: #3b9eff; color: #00121f; font-weight: 700; font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="logo">SC</div>
      <h1>Sin conexión</h1>
      <p>No hay internet ahora mismo. La telemetría se retomará cuando vuelva la red.</p>
      <button onclick="location.reload()">Reintentar</button>
    </div>
  </body>
</html>
